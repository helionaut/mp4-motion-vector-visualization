name: Intake Docs CI

on:
  pull_request:
  push:
    branches:
      - main
      - eugeniy/**

jobs:
  validate-intake-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate intake planning docs
        run: python3 scripts/validate_intake_docs.py

      - name: Validate environment contract
        run: python3 scripts/validate_environment_contract.py

      - name: Check for whitespace errors
        run: git diff --check
